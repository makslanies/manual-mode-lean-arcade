name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and build
        run: |
          npm run typecheck
          npm run build
        env:
          VITE_BASE_URL: /
          VITE_ENABLE_DEMO_HOOKS: "false"

      - name: Run unit tests
        run: npm test

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: manual-mode-lean-arcade:ci
          build-args: |
            VITE_BASE_URL=/
            VITE_ENABLE_DEMO_HOOKS=false

      - name: Smoke test container
        run: |
          docker run -d --name mm-smoke -p 8080:8080 manual-mode-lean-arcade:ci
          for i in $(seq 1 30); do
            if wget -qO- http://127.0.0.1:8080/healthz | grep -q ok; then
              wget -qO /dev/null http://127.0.0.1:8080/
              exit 0
            fi
            sleep 1
          done
          docker logs mm-smoke
          exit 1
