services:
  web:
    env_file:
      - path: .env
        required: false
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_BASE_URL: ${VITE_BASE_URL:-/}
        VITE_ENABLE_DEMO_HOOKS: ${VITE_ENABLE_DEMO_HOOKS:-true}
    image: manual-mode-lean-arcade:${IMAGE_TAG:-local}
    ports:
      - "${PORT:-8080}:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  dev:
    profiles: ["dev"]
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - dev_node_modules:/app/node_modules
    ports:
      - "${DEV_PORT:-5173}:5173"
    environment:
      VITE_BASE_URL: ${VITE_BASE_URL:-/}
      VITE_ENABLE_DEMO_HOOKS: ${VITE_ENABLE_DEMO_HOOKS:-true}
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  dev_node_modules:
